spring:
  application:
    name: golf-courses
  datasource:
    url: jdbc:postgresql://localhost:5432/golfcourses
    username: golfcourses
    password: golfcourses
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8080

app:
  admin:
    email: ${ADMIN_USER_EMAIL:admin@company.com}
    password: ${ADMIN_USER_PASSWORD:admin123!}
    full-name: ${ADMIN_USER_FULL_NAME:Administrator}
  standard-user:
    email: ${STANDARD_USER_EMAIL:user@company.com}
    password: ${STANDARD_USER_PASSWORD:heslo123!}
    full-name: ${STANDARD_USER_FULL_NAME:Standard User}

  remember-me-key: ${REMEMBER_ME_KEY:golf-courses-remember-me-key}
