<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav th:fragment="nav">
    <div class="nav-container">
        <a href="/" class="nav-brand">Golf Courses</a>
        <div class="nav-links" sec:authorize="isAuthenticated()">
            <a href="/" th:href="@{/}">Domů</a>
            <a href="/admin/users" th:href="@{/admin/users}" sec:authorize="hasRole('ADMIN')">Uživatelé</a>
            <a href="/profile" th:href="@{/profile}">Profil</a>
            <form th:action="@{/logout}" method="post" class="nav-logout">
                <button type="submit">Odhlásit</button>
            </form>
        </div>
    </div>
</nav>

</html>
